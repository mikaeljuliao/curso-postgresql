02:11 - Teoria: Como os dados eram armazenados e surgimento dos Bancos de Dados

Antes de iniciar o estudo de banco de dados, é importante entender como os dados eram armazenados no passado.

Nas décadas de 60 e 70, não existiam bancos de dados relacionais como conhecemos hoje. As informações eram armazenadas 
fisicamente, em grandes armários com gavetas e pastas.

Exemplo de organização da época:
- Armário → representava o "banco de dados"
- Pastas → representavam "tabelas"
- Papéis → representavam os "registros"

Dentro desses armários, empresas guardavam informações de clientes, funcionários, fornecedores, entre outros.

Problemas desse modelo:
- Limitação de espaço físico
- Dificuldade de organização
- Baixa eficiência para busca de informações
- Risco de perda de dados

Com o crescimento da quantidade de informações, surgiu a necessidade de armazenar dados de forma digital.

Foi então que surgiram:
- Sistemas de banco de dados
- Modelos relacionais
- A linguagem SQL

Inicialmente, esses bancos funcionavam de forma local (offline), armazenados em computadores. Com o tempo, 
evoluíram para sistemas conectados à internet (web).

Fazendo uma analogia com o modelo antigo:
- Armário = Banco de Dados
- Pastas = Tabelas
- Papéis = Registros (linhas)

Exemplo prático:
Se uma empresa quiser armazenar fornecedores e funcionários:
- Teríamos uma tabela "fornecedores"
- Teríamos uma tabela "funcionarios"
- Cada tabela conteria vários registros

05:05 - O que é a linguagem SQL e como ela funciona?

SQL (Structured Query Language) significa "Linguagem de Consulta Estruturada".

É uma linguagem utilizada para se comunicar com bancos de dados.

Ela é considerada "universal" porque:
- A estrutura dos comandos é praticamente a mesma em diferentes bancos (PostgreSQL, MySQL, etc.)
- Pode ser usada em diferentes tipos de aplicações (web, mobile, desktop)

Com SQL é possível:
- Criar dados (CREATE)
- Inserir dados (INSERT)
- Consultar dados (SELECT)
- Atualizar dados (UPDATE)
- Deletar dados (DELETE)

Ou seja, ela permite controlar completamente um banco de dados.

Aprendendo SQL, você consegue trabalhar com praticamente qualquer tecnologia que utilize banco de dados.


--------------------------------------------------

Estrutura de um Banco de Dados

Um banco de dados é organizado em tabelas, e cada tabela contém registros.

Visualização da estrutura:

Banco de Dados
│
├── Tabela: funcionarios
│   ├── Registro
│   ├── Registro
│   └── Registro
│
├── Tabela: vendas
│   ├── Registro
│   ├── Registro
│   └── Registro
│
└── Tabela: fornecedores
    ├── Registro
    ├── Registro
    └── Registro

Ou seja:
- Um banco pode ter várias tabelas
- Cada tabela possui vários registros (linhas)


--------------------------------------------------

Exemplo de Tabela (usuarios)

Tabela: usuarios

| nome             | nascimento  | sexo | pais    |
|------------------|------------|------|---------|
| João Pedro       | 07/09/1991 | M    | Brasil  |
| Maria da Silva   | 20/12/1997 | F    | Espanha |
| Cleber Duarte    | 08/07/1984 | M    | EUA     |


--------------------------------------------------

Entendendo melhor a tabela

Uma tabela é composta por:

1. Colunas (Campos)
São as categorias de informação:
- nome
- nascimento
- sexo
- pais

Também chamadas de "campos" da tabela.

2. Linhas (Registros)
São os dados armazenados:
- João Pedro, 07/09/1991, M, Brasil
- Maria da Silva, 20/12/1997, F, Espanha

Cada linha representa um registro completo dentro da tabela.

Resumo:
- Colunas = tipo de informação (campos)
- Linhas = dados armazenados (registros)
















09:11 - O que é um SGBD (Sistema de Gerenciamento de Banco de Dados)?

SGBD vem do inglês Database Management System (DBMS), que significa Sistema de Gerenciamento de Banco de Dados.

É um software responsável por gerenciar bancos de dados.

Seu principal objetivo é:
- Gerenciar acessos
- Armazenar informações
- Organizar dados
- Manipular dados
- Permitir importação e exportação

Basicamente, é um software que fornece uma interface mais amigável para gerenciar o banco de dados.


Importante entender:

Nós temos a linguagem SQL, que é usada para criar bancos de dados, tabelas e registros.

Porém, não conseguimos utilizar SQL “puro” sem um SGBD.

O SGBD é o sistema que permite executar esses comandos na prática.

Ou seja:
- SQL = linguagem
- SGBD = sistema que executa essa linguagem


Na prática:

Criamos o banco de dados dentro do SGBD, e através dele podemos utilizar esses dados em aplicações:

- Web
- Mobile
- Desktop
- Android / iOS

O SGBD é o ambiente onde tudo acontece.


O que podemos fazer dentro de um SGBD:

- Criar bancos de dados
- Criar tabelas
- Inserir e gerenciar dados (clientes, fornecedores, etc.)
- Fazer backup
- Importar e exportar dados
- Gerenciar usuários e permissões (acesso, senha, etc.)

Ou seja, ele cuida de todo o gerenciamento dos dados.


Principais SGBDs do mercado:

- Oracle (empresa Oracle)
- MySQL (também da Oracle)
- SQL Server (da Microsoft)
- PostgreSQL (código aberto)


Sobre o PostgreSQL:

O sistema escolhido no curso é o PostgreSQL.

Ele é:
- Gratuito
- Open source (código aberto)
- Muito utilizado no mercado
- Bastante usado por empresas e startups



Resumo:
- SQL = linguagem usada para se comunicar com o banco
- SGBD = sistema que executa essa linguagem e gerencia os dados

Importante:
- Cada SGBD pode ter pequenas diferenças, mas a base do SQL é praticamente a mesma em todos.
- Por isso, aprendendo um (como PostgreSQL), você consegue se adaptar facilmente a outros.














13:04 - Download e instalação do PostgreSQL no Windows

Para baixar o PostgreSQL, primeiro precisamos acessar o site oficial.

Pesquisando no navegador por "PostgreSQL", iremos acessar:
https://www.postgresql.org/

Dentro do site:

- Clique no botão de download
- Escolha o sistema operacional Windows

Após isso, serão exibidas as versões disponíveis.

Devemos clicar na opção de baixar o instalador e escolher a versão mais recente para Windows.


Instalação:

Após o download:

- Localize o arquivo na pasta
- Execute como administrador

O processo de instalação será iniciado automaticamente.


Durante a instalação:

- Clique em "Next" e mantenha todas as configurações padrão

Em um momento, será solicitado:

Criação da senha do superuser (usuário administrador do banco de dados)

Importante:

- Essa senha será usada para acessar o banco de dados posteriormente
- É muito importante não esquecer essa senha

Caso perca ou esqueça a senha, será necessário reinstalar o PostgreSQL.


Configurações finais:

- Porta padrão: 5432  
  (Pode manter essa porta e alterar depois, se necessário)

- Cluster: deixar como "default"

Depois disso:

- Clique em "Next"
- Finalize a instalação


Resumo:

- Baixar no site oficial
- Instalar mantendo padrão
- Definir senha do superuser
- Manter porta 5432
- Finalizar instalação
